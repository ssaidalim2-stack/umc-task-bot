<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>UMC Task</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #fff);
    --text: var(--tg-theme-text-color, #111);
    --hint: var(--tg-theme-hint-color, #888);
    --card: var(--tg-theme-secondary-bg-color, #f3f4f6);
    --btn: var(--tg-theme-button-color, #2ea6ff);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --accent:#22c55e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:72px;font-size:15px}
  header{padding:14px 16px 6px}
  header h1{margin:0;font-size:20px;font-weight:700}
  header .sub{color:var(--hint);font-size:13px;margin-top:2px}
  .wrap{padding:8px 12px}
  .card{background:var(--card);border-radius:14px;padding:14px;margin:10px 0}
  .card h3{margin:0 0 8px;font-size:16px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .muted{color:var(--hint);font-size:13px}
  .bar{height:8px;border-radius:6px;background:rgba(127,127,127,.25);overflow:hidden;margin:6px 0}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:6px}
  .chip{display:inline-block;padding:3px 9px;border-radius:20px;background:rgba(127,127,127,.18);font-size:12px;margin:2px 4px 2px 0}
  .btn{appearance:none;border:0;border-radius:10px;background:var(--btn);color:var(--btn-text);padding:9px 12px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.sec{background:rgba(127,127,127,.18);color:var(--text)}
  .btn.full{width:100%;margin-top:8px}
  .btn.sm{padding:6px 10px;font-size:13px}
  .vid{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(127,127,127,.15)}
  .vid:last-child{border-bottom:0}
  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;background:var(--bg);border-top:1px solid rgba(127,127,127,.2)}
  .tabbar button{flex:1;background:none;border:0;color:var(--hint);padding:8px 2px 10px;font-size:11px;cursor:pointer}
  .tabbar button.active{color:var(--btn)}
  .tabbar .ic{display:block;font-size:20px;margin-bottom:2px}
  .pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px}
  .pill{white-space:nowrap;padding:7px 12px;border-radius:20px;background:var(--card);font-size:13px;cursor:pointer;border:1px solid transparent}
  .pill.active{background:var(--btn);color:var(--btn-text)}
  a{color:var(--btn)}
  .empty{text-align:center;color:var(--hint);padding:30px 10px}
  .stageline{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
  .seg{flex:1;min-width:54px;text-align:center;font-size:11px;padding:5px 2px;border-radius:8px;background:rgba(127,127,127,.15)}
  .seg.on{background:var(--accent);color:#062}
</style>
</head>
<body>
<header>
  <h1>📊 UMC Task</h1>
  <div class="sub" id="period">загрузка…</div>
</header>
<div class="wrap" id="view"></div>

<div class="tabbar" id="tabs">
  <button data-t="plan" class="active"><span class="ic">📋</span>План</button>
  <button data-t="video"><span class="ic">🎬</span>Видео</button>
  <button data-t="tasks"><span class="ic">✅</span>Задачи</button>
  <button data-t="report"><span class="ic">📈</span>Отчёт</button>
  <button data-t="subs"><span class="ic">💳</span>Подписки</button>
</div>

<script>
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
const INIT = tg.initData || "";
let DATA=null, TAB="plan", PROJ=null;

async function api(method, body){
  const r = await fetch('/api/app',{method,headers:{'Content-Type':'application/json','X-Init-Data':INIT},body:body?JSON.stringify(body):undefined});
  if(!r.ok){ throw new Error('api '+r.status); }
  return r.json();
}
function haptic(){ try{ tg.HapticFeedback.impactOccurred('light'); }catch(e){} }
async function load(){ try{ DATA=await api('GET'); render(); }catch(e){ document.getElementById('view').innerHTML='<div class="empty">Ошибка загрузки. Открой через кнопку в боте.</div>'; } }
async function act(a){ haptic(); DATA=await api('POST',a); render(); }

function bar(done,total){ const p= total? Math.round(done/total*100):0; return `<div class="bar"><i style="width:${p}%"></i></div>`; }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render(){
  document.getElementById('period').textContent = DATA.period || '';
  const v=document.getElementById('view');
  if(TAB==='plan') v.innerHTML=renderPlan();
  else if(TAB==='video') v.innerHTML=renderVideo();
  else if(TAB==='tasks') v.innerHTML=renderTasks();
  else if(TAB==='report') v.innerHTML=renderReport();
  else if(TAB==='subs') v.innerHTML=renderSubs();
  bind();
}

function renderPlan(){
  return DATA.projects.map(p=>{
    const pub=p.video.published||0;
    return `<div class="card">
      <div class="row"><h3>${esc(p.name)}</h3>${p.sheet_url?`<a href="${p.sheet_url}" target="_blank">📊 Таблица</a>`:''}</div>
      <div class="muted">🎬 Видео: ${pub}/${p.videoTotal} опубликовано</div>${bar(pub,p.videoTotal)}
      <div class="muted">🖼 Графика: ${p.graphicDone}/${p.graphicTotal}</div>${bar(p.graphicDone,p.graphicTotal)}
      <button class="btn sm sec" data-go-video="${p.id}">Открыть видео →</button>
    </div>`;
  }).join('');
}

function renderVideo(){
  if(!PROJ) PROJ=DATA.projects[0]?.id;
  const pills=DATA.projects.map(p=>`<div class="pill ${p.id==PROJ?'active':''}" data-proj="${p.id}">${esc(p.name)}</div>`).join('');
  const p=DATA.projects.find(x=>x.id==PROJ);
  if(!p) return '<div class="empty">Нет проектов</div>';
  const stages=DATA.stages, lbl=DATA.stageLabels;
  const items=p.videos.map(vd=>{
    const segs=stages.map(s=>{ const idx=stages.indexOf(s), cur=stages.indexOf(vd.stage); return `<div class="seg ${idx<=cur?'on':''}">${lbl[s].replace(/^[^ ]+ /,'')}</div>`;}).join('');
    const nx = stages[stages.indexOf(vd.stage)+1];
    let actions='';
    if(vd.stage==='idea'){
      actions+=`<button class="btn sm ${vd.format==='fun'?'':'sec'}" data-fmt="${vd.id}:fun">🎭</button>
                <button class="btn sm ${vd.format==='sell'?'':'sec'}" data-fmt="${vd.id}:sell">💰</button>`;
    }
    if(nx) actions+=`<button class="btn sm" data-adv="${vd.id}">→ ${lbl[nx].replace(/^[^ ]+ /,'')}</button>`;
    else actions+=`<span class="chip">✅ готово</span>`;
    return `<div class="card"><div class="row"><b>Видео #${vd.idx}</b><span class="chip">${lbl[vd.stage]}</span></div>
      <div class="stageline">${segs}</div>
      <div class="row" style="margin-top:10px;gap:6px;justify-content:flex-end">${actions}</div></div>`;
  }).join('');
  return `<div class="pills">${pills}</div>
    <div class="card"><div class="row"><h3>${esc(p.name)}</h3></div>
    <div class="muted">🖼 Графика ${p.graphicDone}/${p.graphicTotal}</div>
    <button class="btn sm full" data-gfx="${p.id}">🖼 +1 графика готова</button></div>
    ${items}`;
}

function renderTasks(){
  let html='';
  html+=`<div class="card"><h3>✅ Мои задачи</h3>`;
  if(!DATA.myTasks.length) html+='<div class="muted">Активных задач нет 🎉</div>';
  html+=DATA.myTasks.map(t=>`<div class="vid"><span>${esc(t.title)}</span><button class="btn sm" data-done="${t.id}">Выполнил</button></div>`).join('');
  html+='</div>';
  if(DATA.confirmable.length){
    html+=`<div class="card"><h3>🔔 На подтверждение</h3>`;
    html+=DATA.confirmable.map(t=>`<div class="vid"><span>${esc(t.title)}</span><button class="btn sm" data-confirm="${t.id}">Подтвердить</button></div>`).join('');
    html+='</div>';
  }
  return html;
}

function renderReport(){
  const t=DATA.totals;
  const labels=DATA.projects.map(p=>p.name.split(' ')[0]);
  const pub=DATA.projects.map(p=>p.video.published||0);
  const tot=DATA.projects.map(p=>p.videoTotal);
  const chart={type:'bar',data:{labels,datasets:[{label:'Опубл.',data:pub,backgroundColor:'#22c55e'},{label:'План',data:tot,backgroundColor:'#94a3b8'}]}};
  const url='https://quickchart.io/chart?w=560&h=320&c='+encodeURIComponent(JSON.stringify(chart));
  return `<div class="card"><h3>📈 Сводка</h3>
    <div class="muted">🎬 Видео опубликовано: <b>${t.published}/${t.videoTotal}</b></div>${bar(t.published,t.videoTotal)}
    <div class="muted">🖼 Графика готова: <b>${t.graphicDone}/${t.graphicTotal}</b></div>${bar(t.graphicDone,t.graphicTotal)}
    <div class="muted">📌 Открытых задач: <b>${t.openTasks}</b></div>
  </div>
  <div class="card"><img src="${url}" style="width:100%;border-radius:10px" alt="chart"></div>`;
}

function renderSubs(){
  if(!DATA.subscriptions.length) return '<div class="card"><h3>💳 Подписки</h3><div class="muted">Пока нет. Добавь в боте: /addsub CapCut 2026-06-01 30</div></div>';
  return `<div class="card"><h3>💳 Подписки</h3>`+DATA.subscriptions.map(s=>`<div class="vid"><span>${esc(s.app)}</span><span class="muted">до ${s.expires_on}</span></div>`).join('')+`</div>`;
}

function bind(){
  document.querySelectorAll('[data-go-video]').forEach(b=>b.onclick=()=>{PROJ=+b.dataset.goVideo;TAB='video';setTab();render();});
  document.querySelectorAll('[data-proj]').forEach(b=>b.onclick=()=>{PROJ=+b.dataset.proj;render();});
  document.querySelectorAll('[data-adv]').forEach(b=>b.onclick=()=>act({type:'vid_adv',id:+b.dataset.adv}));
  document.querySelectorAll('[data-fmt]').forEach(b=>b.onclick=()=>{const[id,f]=b.dataset.fmt.split(':');act({type:'vid_fmt',id:+id,format:f});});
  document.querySelectorAll('[data-gfx]').forEach(b=>b.onclick=()=>act({type:'gfx_done',projectId:+b.dataset.gfx}));
  document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>act({type:'task_done',id:+b.dataset.done}));
  document.querySelectorAll('[data-confirm]').forEach(b=>b.onclick=()=>act({type:'task_confirm',id:+b.dataset.confirm}));
}
function setTab(){ document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('active',x.dataset.t===TAB)); }
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{TAB=b.dataset.t;setTab();render();});

load();
</script>
</body>
</html>
