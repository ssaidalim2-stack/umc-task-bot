<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>UMC Task</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #fff);
    --text: var(--tg-theme-text-color, #111);
    --hint: var(--tg-theme-hint-color, #888);
    --card: var(--tg-theme-secondary-bg-color, #f3f4f6);
    --btn: var(--tg-theme-button-color, #2ea6ff);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --accent:#22c55e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:74px;font-size:15px}
  header{padding:14px 16px 6px}
  header h1{margin:0;font-size:20px;font-weight:700}
  header .sub{color:var(--hint);font-size:13px;margin-top:2px}
  .wrap{padding:8px 12px}
  .card{background:var(--card);border-radius:14px;padding:14px;margin:10px 0}
  .card h3{margin:0 0 8px;font-size:16px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .muted{color:var(--hint);font-size:13px}
  .bar{height:8px;border-radius:6px;background:rgba(127,127,127,.25);overflow:hidden;margin:6px 0}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:6px}
  .chip{display:inline-block;padding:3px 9px;border-radius:20px;background:rgba(127,127,127,.18);font-size:12px;margin:2px 4px 2px 0}
  .btn{appearance:none;border:0;border-radius:10px;background:var(--btn);color:var(--btn-text);padding:9px 12px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.sec{background:rgba(127,127,127,.18);color:var(--text)}
  .btn.full{width:100%;margin-top:8px}
  .btn.sm{padding:6px 10px;font-size:13px}
  .vid{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(127,127,127,.15);gap:8px}
  .vid:last-child{border-bottom:0}
  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;overflow-x:auto;background:var(--bg);border-top:1px solid rgba(127,127,127,.2)}
  .tabbar button{flex:0 0 auto;min-width:20%;background:none;border:0;color:var(--hint);padding:8px 6px 10px;font-size:11px;cursor:pointer}
  .tabbar button.active{color:var(--btn)}
  .tabbar .ic{display:block;font-size:20px;margin-bottom:2px}
  .pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px}
  .pill{white-space:nowrap;padding:7px 12px;border-radius:20px;background:var(--card);font-size:13px;cursor:pointer;border:1px solid transparent}
  .pill.active{background:var(--btn);color:var(--btn-text)}
  a{color:var(--btn)}
  .empty{text-align:center;color:var(--hint);padding:30px 10px}
  .stageline{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
  .seg{flex:1;min-width:54px;text-align:center;font-size:11px;padding:5px 2px;border-radius:8px;background:rgba(127,127,127,.15)}
  .seg.on{background:var(--accent);color:#062}
  textarea{width:100%;min-height:120px;border-radius:12px;border:1px solid rgba(127,127,127,.3);background:var(--bg);color:var(--text);padding:10px;font-size:15px;font-family:inherit;resize:vertical}
  input{width:100%;border-radius:12px;border:1px solid rgba(127,127,127,.3);background:var(--bg);color:var(--text);padding:9px 10px;font-size:15px;font-family:inherit}
  .vid[data-topen]{cursor:pointer}
  .badge{font-size:11px;padding:2px 7px;border-radius:10px;background:rgba(127,127,127,.2)}
  .ctab{width:100%;border-collapse:collapse;font-size:13px}
  .ctab th,.ctab td{padding:7px 4px;text-align:center;border-bottom:1px solid rgba(127,127,127,.15);white-space:nowrap}
  .ctab th{color:var(--hint);font-weight:600}
  .ctab td:first-child,.ctab th:first-child{text-align:left;position:sticky;left:0;background:var(--card)}
  .board{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 10px}
  .bcol{flex:0 0 80%;max-width:300px;background:var(--card);border-radius:12px;padding:10px}
  .bhead{font-weight:700;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .bcount{font-size:12px;color:var(--hint);background:rgba(127,127,127,.2);border-radius:10px;padding:1px 8px}
  .bcard{background:var(--bg);border-radius:10px;padding:8px 10px;margin-bottom:6px;font-size:13px}
  .rowdl{width:78px;padding:5px 7px;border-radius:8px;border:1px solid rgba(127,127,127,.3);background:var(--bg);color:var(--text);font-size:12px;flex:0 0 auto}
</style>
</head>
<body>
<header>
  <h1>📊 UMC Task</h1>
  <div class="sub" id="period">загрузка…</div>
</header>
<div class="wrap" id="view"></div>
<div class="tabbar" id="tabs"></div>

<script>
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
const INIT = tg.initData || "";
let DATA=null, TAB=null, PROJ=null, WORK_EMP=0, TZ_SEC="video", TZ_PROJ="", TZ_EXEC="Самандар";
const EXEC=["Самандар","Асрор","Владимир"];
const SEC_DEFAULT={video:"Самандар",design:"Владимир",edit:"Асрор"};
// шаблоны ТЗ по разделам: [id, label, многострочное]
const TZ_TEMPLATES={
  video:[["idea","Идея / сценарий",true],["reference","Референс",false],["props","Реквизиты",true],["shoot","Дата съёмки",false],["deadline","Дедлайн",false],["notes","Примечания",true]],
  edit:[["script","Сценарий",true],["reference","Референс",false],["deadline","Дедлайн",false],["style","Стиль",false],["notes","Примечания",true]],
  design:[["format","Формат (напр. 4:5)",false],["text","Текст (Headline / Subheadline)",true],["style","Стиль",false],["colors","Цвета",false],["fonts","Шрифты",false],["reference","Референс",false],["elements","Элементы",true],["deadline","Дедлайн",false],["notes","Доп. комментарии",true]],
};
let TZ_FIELDS={};
function captureTZ(){ (TZ_TEMPLATES[TZ_SEC]||[]).forEach(([id])=>{ const e=document.getElementById('tz_'+id); if(e) TZ_FIELDS[id]=e.value; }); }
// состояние таблицы
let TBL_PROJ=null, TBL_PLAN=null, TBL_ITEMS=null, TBL_OPEN=null, TBL_LOADED=null, TBL_NEWPERIOD=false;
let ASSIGN_I=0;
const TYPE_OPTS=[["video","🎬 Видео"],["graphic","🖼 Граф-пост"],["photo","📷 Фото"]];
const TYPE_ICON={video:"🎬",graphic:"🖼",photo:"📷"};
function STATUS_OPTS(type){ return type==='video'
  ? [["idea","🕒 В плане"],["shoot","🎥 Снято"],["edit","✂️ Смонтировано"],["published","✅ Опубликовано"]]
  : [["todo","🕒 В работе"],["done","✅ Готово"]]; }
function statusLabel(type,stage){ const o=STATUS_OPTS(type).find(x=>x[0]==stage); return o?o[1]:stage; }
const LANG_OPTS=[["ru","🇷🇺 Рус"],["uz","🇺🇿 Узб"],["en","🇬🇧 Англ"]];
const LANG_SHORT={ru:"РУС",uz:"УЗБ",en:"ENG"};
function canEdit(){ return DATA.user.role==='admin'||DATA.user.role==='manager'; }
function val(id){ const e=document.getElementById(id); return e?e.value:''; }
function captureFields(it){ if(document.getElementById('f_script')){ it.theme=val('f_theme'); it.script=val('f_script'); it.reference=val('f_reference'); it.props=val('f_props'); it.shoot_date=val('f_shoot'); it.deadline=val('f_deadline'); } }

const TABMETA={
  home:{ic:"🏠",t:"Главная"}, board:{ic:"📌",t:"Доска"}, work:{ic:"🗂️",t:"Работа"}, plan:{ic:"📋",t:"Таблица"}, video:{ic:"🎬",t:"Видео"},
  tz:{ic:"✍️",t:"ТЗ"}, tasks:{ic:"✅",t:"Задачи"}, report:{ic:"📈",t:"Отчёт"},
  subs:{ic:"💳",t:"Подписки"}, mywork:{ic:"🗂️",t:"Моя работа"},
};
const SEC=[["video","🎬 Видео"],["design","🎨 Дизайн"],["edit","✂️ Монтаж"]];

async function api(method, body){
  const r=await fetch('/api/app',{method,headers:{'Content-Type':'application/json','X-Init-Data':INIT},body:body?JSON.stringify(body):undefined});
  if(!r.ok) throw new Error('api '+r.status);
  return r.json();
}
function haptic(){ try{ tg.HapticFeedback.impactOccurred('light'); }catch(e){} }
async function load(){ try{ DATA=await api('GET'); if(!TAB||!DATA.tabs.includes(TAB)) TAB=DATA.tabs[0]; buildTabs(); render(); }catch(e){ document.getElementById('view').innerHTML='<div class="empty">Ошибка загрузки. Открой через кнопку в боте.</div>'; } }
async function act(a){ haptic(); const res=await api('POST',a); if(res&&res.projects){DATA=res;} else if(res&&res.items){TBL_ITEMS=res.items;} render(); }

function bar(done,total){ const p=total?Math.round(done/total*100):0; return `<div class="bar"><i style="width:${p}%"></i></div>`; }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function buildTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML=DATA.tabs.map(t=>`<button data-t="${t}" class="${t===TAB?'active':''}"><span class="ic">${TABMETA[t].ic}</span>${TABMETA[t].t}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{TAB=b.dataset.t;buildTabs();render();});
}

function render(){
  document.getElementById('period').textContent=(DATA.user.role?roleLabel(DATA.user.role)+' · ':'')+(DATA.period||'');
  const v=document.getElementById('view');
  const map={home:renderHome,board:renderBoard,plan:renderTable,video:renderVideo,tasks:renderTasks,report:renderReport,subs:renderSubs,work:renderWork,tz:renderTZ,mywork:renderMyWork};
  v.innerHTML=(map[TAB]||renderTasks)();
  bind();
}
function roleLabel(r){return {admin:"Админ",manager:"Менеджер",videographer:"Видеограф",editor:"Монтажёр",designer:"Дизайнер",member:"Сотрудник"}[r]||"";}

function renderTable(){
  const projects=DATA.projects;
  if(!TBL_PROJ || !projects.some(x=>x.id==TBL_PROJ)) TBL_PROJ=projects[0]?.id;
  const p=projects.find(x=>x.id==TBL_PROJ);
  if(!p) return '<div class="empty">Нет проектов</div>';
  const plans=p.plans||[];
  if(!TBL_PLAN || !plans.some(pl=>pl.id==TBL_PLAN)) TBL_PLAN=(plans.find(pl=>pl.is_active)||plans[0])?.id||null;
  // ленивая подгрузка пунктов при смене периода
  if(TBL_PLAN && TBL_LOADED!==TBL_PLAN){ TBL_LOADED=TBL_PLAN; TBL_ITEMS=null; setTimeout(()=>act({type:'plan_items',planId:TBL_PLAN}),0); }

  if(TBL_OPEN) return renderItemDetail();

  const projPills=projects.map(x=>`<div class="pill ${x.id==TBL_PROJ?'active':''}" data-tproj="${x.id}">${esc(x.name)}</div>`).join('');
  const periodPills=plans.map(pl=>`<div class="pill ${pl.id==TBL_PLAN?'active':''}" data-tplan="${pl.id}">${esc(pl.period)}${pl.is_active?' •':''}</div>`).join('')
    + (canEdit()?`<div class="pill" data-tplan-new>＋ период</div>`:'');

  const newP = (TBL_NEWPERIOD && canEdit()) ? `<div class="card"><div class="muted">Новый период (таблица):</div>
    <input id="np_name" placeholder="напр. Июль–Август 2026">
    <div class="row" style="gap:10px;margin-top:6px">
      <div style="flex:1"><div class="muted">Видео:</div><input id="np_videos" value="10" inputmode="numeric"></div>
      <div style="flex:1"><div class="muted">Граф-постов:</div><input id="np_graphics" value="3" inputmode="numeric"></div>
    </div>
    <button class="btn full" data-np-create style="margin-top:8px">Создать таблицу</button></div>` : '';

  let rows;
  if(TBL_ITEMS===null) rows='<div class="muted">Загрузка…</div>';
  else if(!TBL_ITEMS.length) rows='<div class="muted">Пунктов пока нет. Добавь ниже.</div>';
  else rows=TBL_ITEMS.map((it,i)=>rowHtml(it,i+1)).join('');

  const addBtns = (canEdit() && TBL_PLAN) ? `<div class="row" style="gap:6px;margin-top:12px;flex-wrap:wrap">
    <button class="btn sm" data-tadd="video">＋ Видео</button>
    <button class="btn sm sec" data-tadd="graphic">＋ Граф-пост</button>
    <button class="btn sm sec" data-tadd="photo">＋ Фото</button></div>`:'';

  return `<div class="pills">${projPills}</div><div class="pills">${periodPills}</div>${newP}
    <div class="card"><h3>📋 ${esc(p.name)}</h3>${rows}${addBtns}</div>`;
}

function rowHtml(it,pos){
  const ti=TYPE_ICON[it.type]||'•';
  const theme=(it.theme||'').trim();
  const body=theme?esc(theme):'<span class="muted">без темы</span>';
  const dl=canEdit()
    ? `<input class="rowdl" data-dl="${it.id}" value="${esc(it.deadline||'')}" placeholder="дедлайн">`
    : (it.deadline?`<span class="chip">⏰ ${esc(it.deadline)}</span>`:'');
  const mv=canEdit()?`<button class="btn sm sec" data-mv="${it.id}:${pos-1}" title="выше">▲</button><button class="btn sm sec" data-mv="${it.id}:${pos+1}" title="ниже">▼</button>`:'';
  const lg=it.lang?`<span class="chip">${LANG_SHORT[it.lang]||it.lang}</span>`:'';
  return `<div class="vid"><div data-topen="${it.id}" style="min-width:0;flex:1;cursor:pointer"><b>#${it.idx}</b> ${ti} ${body}</div>${dl}${lg}<span class="chip">${statusLabel(it.type,it.stage)}</span>${mv}</div>`;
}

function renderItemDetail(){
  const it=(TBL_ITEMS||[]).find(x=>x.id==TBL_OPEN);
  if(!it){ TBL_OPEN=null; return renderTable(); }
  const typePills=TYPE_OPTS.map(([k,l])=>`<div class="pill ${it.type==k?'active':''}" data-titype="${k}">${l}</div>`).join('');
  const statusPills=STATUS_OPTS(it.type).map(([k,l])=>`<div class="pill ${it.stage==k?'active':''}" data-tstatus="${k}">${l}</div>`).join('');
  const scriptLabel=it.type==='video'?'Сценарий':'Текст содержания';
  const ro=canEdit()?'':'disabled';
  return `<div class="card">
    <div class="row"><h3>Пункт #${it.idx}</h3><button class="btn sm sec" data-tclose>← назад</button></div>
    <div class="muted">№ позиция (перенести на другой номер):</div><input id="f_pos" value="${it.idx}" inputmode="numeric" style="max-width:130px" ${ro}>
    <div class="muted">Тема / заголовок:</div><input id="f_theme" value="${esc(it.theme||'')}" placeholder="о чём видео" ${ro}>
    <div class="muted">Тип:</div><div class="pills">${typePills}</div>
    <div class="muted">Язык:</div><div class="pills">${LANG_OPTS.map(([k,l])=>`<div class="pill ${it.lang==k?'active':''}" data-tlang="${k}">${l}</div>`).join('')}</div>
    <div class="muted">${scriptLabel}:</div><textarea id="f_script" ${ro}>${esc(it.script)}</textarea>
    <div class="muted">Референс:</div><textarea id="f_reference" style="min-height:52px" ${ro}>${esc(it.reference)}</textarea>
    <div class="muted">Реквизиты:</div><textarea id="f_props" style="min-height:52px" ${ro}>${esc(it.props)}</textarea>
    <div class="row" style="gap:10px"><div style="flex:1"><div class="muted">Дата съёмки:</div><input id="f_shoot" value="${esc(it.shoot_date)}" placeholder="ДД.ММ" ${ro}></div>
      <div style="flex:1"><div class="muted">Дедлайн:</div><input id="f_deadline" value="${esc(it.deadline)}" placeholder="ДД.ММ" ${ro}></div></div>
    <div class="muted" style="margin-top:8px">Статус:</div><div class="pills">${statusPills}</div>
    ${canEdit()?`<button class="btn full" data-tsave="${it.id}">💾 Сохранить</button><button class="btn sm sec full" data-tdel="${it.id}">🗑 Удалить пункт</button>`:''}
  </div>`;
}

function renderVideo(){
  if(!PROJ) PROJ=DATA.projects[0]?.id;
  const pills=DATA.projects.map(p=>`<div class="pill ${p.id==PROJ?'active':''}" data-proj="${p.id}">${esc(p.name)}</div>`).join('');
  const p=DATA.projects.find(x=>x.id==PROJ); if(!p) return '<div class="empty">Нет проектов</div>';
  const stages=DATA.stages, lbl=DATA.stageLabels;
  const items=p.videos.map(vd=>{
    const segs=stages.map(s=>{const i=stages.indexOf(s),c=stages.indexOf(vd.stage);return `<div class="seg ${i<=c?'on':''}">${lbl[s].replace(/^[^ ]+ /,'')}</div>`;}).join('');
    const nx=stages[stages.indexOf(vd.stage)+1]; let a='';
    if(vd.stage==='idea') a+=`<button class="btn sm ${vd.format==='fun'?'':'sec'}" data-fmt="${vd.id}:fun">🎭</button><button class="btn sm ${vd.format==='sell'?'':'sec'}" data-fmt="${vd.id}:sell">💰</button>`;
    if(nx) a+=`<button class="btn sm" data-adv="${vd.id}">→ ${lbl[nx].replace(/^[^ ]+ /,'')}</button>`; else a+=`<span class="chip">✅ готово</span>`;
    if(vd.pending) a='<span class="chip">⏳ на подтверждении</span>';
    return `<div class="card"><div class="row"><b>Видео #${vd.idx}</b><span class="chip">${lbl[vd.stage]}</span></div><div class="stageline">${segs}</div><div class="row" style="margin-top:10px;gap:6px;justify-content:flex-end">${a}</div></div>`;
  }).join('');
  return `<div class="pills">${pills}</div><div class="card"><div class="row"><h3>${esc(p.name)}</h3>${p.sheet_url?`<a href="${p.sheet_url}" target="_blank">📊 Таблица</a>`:''}</div><div class="muted">🖼 Графика ${p.graphicDone}/${p.graphicTotal}</div><button class="btn sm full" data-gfx="${p.id}">🖼 +1 графика готова</button></div>${items}`;
}

function prog(label,done,total){ return `<div class="muted">${label}: <b>${done}/${total}</b></div>${bar(done,total)}`; }

function renderHome(){
  const u=DATA.user, st=DATA.stats;
  let h=`<div class="card"><h3>👋 Привет, ${esc(u.name||'')}</h3><div class="muted">${roleLabel(u.role)}${DATA.period?' · '+esc(DATA.period):''}</div></div>`;

  h+=`<div class="card"><div class="row"><h3>✅ Мои задачи</h3><span class="chip">${DATA.myTasks.length}</span></div>`;
  h+= DATA.myTasks.length ? DATA.myTasks.slice(0,6).map(t=>`<div class="vid"><span>${esc(t.title)}</span></div>`).join('') : '<div class="muted">Активных задач нет 🎉</div>';
  h+='</div>';

  if(canEdit() && DATA.teamTasks){
    h+=`<div class="card"><div class="row"><h3>👥 Задачи команды на выполнении</h3><span class="chip">${DATA.teamTasks.length}</span></div>`;
    h+= DATA.teamTasks.length ? DATA.teamTasks.slice(0,8).map(t=>`<div class="vid"><span style="min-width:0">${esc(t.title)}</span><span class="muted">${esc(t.who)}</span></div>`).join('') : '<div class="muted">Пока никто ничего не выполняет</div>';
    h+='</div>';
  }

  if(st){
    const T=st.totals;
    h+=`<div class="card"><h3>📈 Прогресс по контент-плану</h3>
      ${prog('📝 Сценарии заполнены',T.scripts,T.videoTotal)}
      ${prog('🎥 Снято',T.shot,T.videoTotal)}
      ${prog('✂️ Смонтировано',T.edited,T.videoTotal)}
      ${prog('✅ Опубликовано',T.published,T.videoTotal)}
      ${prog('🖼 Графика готова',T.graphicDone,T.graphicTotal)}
    </div>`;
    h+=`<div class="card"><h3>🌐 Языки видео</h3>
      <div class="muted">🇷🇺 Рус: <b>${T.langs.ru}</b> · 🇺🇿 Узб: <b>${T.langs.uz}</b> · 🇬🇧 Англ: <b>${T.langs.en}</b> · не указан: ${T.langs.none}</div></div>`;
    h+=`<div class="card" style="overflow-x:auto"><h3>По проектам</h3>
      <table class="ctab">
        <tr><th>Проект</th><th>📝</th><th>🎥</th><th>✂️</th><th>✅</th><th>🖼</th><th>РУС</th><th>УЗБ</th><th>ENG</th></tr>
        ${st.projects.map(p=>`<tr><td><b>${esc(p.name)}</b></td><td>${p.scripts}/${p.videoTotal}</td><td>${p.shot}</td><td>${p.edited}</td><td>${p.published}</td><td>${p.graphicDone}/${p.graphicTotal}</td><td>${p.langs.ru}</td><td>${p.langs.uz}</td><td>${p.langs.en}</td></tr>`).join('')}
      </table>
      <div class="muted" style="margin-top:6px">📝сценарии · 🎥снято · ✂️смонтировано · ✅опубликовано · 🖼графика</div></div>`;
  }
  return h;
}

function renderBoard(){
  const b=DATA.board; if(!b) return '<div class="empty">Нет доступа</div>';
  const col=(title,items)=>`<div class="bcol"><div class="bhead"><span>${title}</span><span class="bcount">${items.length}</span></div>${items.length?items.map(t=>`<div class="bcard"><div>${esc(t.title)}</div><div class="muted">👤 ${esc(t.who)}</div></div>`).join(''):'<div class="muted">—</div>'}</div>`;
  return `<div class="muted" style="margin:2px 0 8px">Свайпай колонки →</div>
    <div class="board">
      ${col('🆕 Назначено',b.new)}
      ${col('🔵 У менеджера',b.manager)}
      ${col('🟢 На финале',b.admin)}
      ${col('✅ Готово',b.done)}
    </div>`;
}

function renderTasks(){
  let h=`<div class="card"><h3>✅ Мои задачи</h3>`;
  if(!DATA.myTasks.length) h+='<div class="muted">Активных задач нет 🎉</div>';
  h+=DATA.myTasks.map(t=>`<div class="vid"><span>${esc(t.title)}</span><div style="display:flex;gap:6px"><button class="btn sm" data-done="${t.id}">Выполнил</button><button class="btn sm sec" data-file="${t.id}" title="Сдать файл">📎</button></div></div>`).join('');
  h+='</div>';
  if(DATA.confirmable&&DATA.confirmable.length){
    h+=`<div class="card"><h3>🔔 Требуют моего утверждения</h3>`;
    h+=DATA.confirmable.map(t=>{
      const stLabel=t.final?'финал (от менеджера)':'от исполнителя';
      const btn=t.final?'✅ Утвердить (финал)':'✅ Утвердить';
      return `<div class="vid"><div style="min-width:0"><span>${esc(t.title)}</span><br><span class="muted">${esc(t.who)} · ${stLabel}</span></div><div style="display:flex;gap:6px"><button class="btn sm" data-approve="${t.id}">${btn}</button><button class="btn sm sec" data-reject="${t.id}">↩️</button></div></div>`;
    }).join('');
    h+='</div>';
  }
  if(canEdit()){
    const team=DATA.team||[];
    if(ASSIGN_I>=team.length) ASSIGN_I=0;
    const pills=team.map((m,i)=>`<div class="pill ${i==ASSIGN_I?'active':''}" data-assignto="${i}">${esc(m.name)}</div>`).join('');
    h+=`<div class="card"><h3>➕ Назначить задачу</h3>
      <div class="muted">Исполнитель:</div><div class="pills">${pills}</div>
      <input id="assignTitle" placeholder="Что нужно сделать…">
      <div class="muted" style="margin-top:6px">Дедлайн (необязательно):</div>
      <input id="assignDeadline" placeholder="напр. 12.07 или 12.07 18:00" style="max-width:240px">
      <button class="btn full" data-assign-send style="margin-top:8px">📌 Назначить</button></div>`;
  }
  return h;
}

function renderReport(){
  const t=DATA.totals;
  const labels=DATA.projects.map(p=>p.name.split(' ')[0]);
  const pub=DATA.projects.map(p=>p.video.published||0), tot=DATA.projects.map(p=>p.videoTotal);
  const chart={type:'bar',data:{labels,datasets:[{label:'Опубл.',data:pub,backgroundColor:'#22c55e'},{label:'План',data:tot,backgroundColor:'#94a3b8'}]}};
  const url='https://quickchart.io/chart?w=560&h=320&c='+encodeURIComponent(JSON.stringify(chart));
  return `<div class="card"><h3>📈 Сводка</h3>
    <div class="muted">🎬 Видео опубликовано: <b>${t.published}/${t.videoTotal}</b></div>${bar(t.published,t.videoTotal)}
    <div class="muted">🖼 Графика готова: <b>${t.graphicDone}/${t.graphicTotal}</b></div>${bar(t.graphicDone,t.graphicTotal)}
    <div class="muted">📌 Открытых задач: <b>${t.openTasks}</b></div></div>
    <div class="card"><img src="${url}" style="width:100%;border-radius:10px" alt="chart"></div>`;
}

function renderSubs(){
  if(!DATA.subscriptions.length) return '<div class="card"><h3>💳 Подписки</h3><div class="muted">Пока нет. Добавь в боте: /addsub CapCut 2026-06-01 30</div></div>';
  return `<div class="card"><h3>💳 Подписки</h3>`+DATA.subscriptions.map(s=>`<div class="vid"><span>${esc(s.app)}</span><span class="muted">до ${s.expires_on}</span></div>`).join('')+`</div>`;
}

function renderWork(){
  const team=DATA.team||[];
  if(WORK_EMP>=team.length) WORK_EMP=0;
  const chips=team.map((m,i)=>`<div class="pill ${i==WORK_EMP?'active':''}" data-emp="${i}">${esc(m.name)}</div>`).join('');
  const m=team[WORK_EMP];
  if(!m) return '<div class="empty">Нет сотрудников</div>';
  let body=`<div class="card"><div class="row"><h3>${esc(m.name)}</h3><span class="badge">${m.role}</span></div>`;
  if(!m.registered) body+='<div class="muted">Ещё не заходил в бота (/start)</div>';
  if(!m.tasks.length) body+='<div class="muted">Активных задач нет</div>';
  body+=m.tasks.map(t=>{
    const pend=['await_manager','await_admin','await_confirm'].includes(t.status);
    const st=pend?'<span class="badge">на утв.</span>':'';
    const btn=pend?`<button class="btn sm" data-approve="${t.id}">✅</button>`:'';
    return `<div class="vid"><span>${esc(t.title)} ${st}</span>${btn}</div>`;
  }).join('');
  body+='</div>';
  return `<div class="pills">${chips}</div>${body}`;
}

function renderTZ(){
  const secPills=SEC.map(([k,l])=>`<div class="pill ${k==TZ_SEC?'active':''}" data-sec="${k}">${l}</div>`).join('');
  const execPills=EXEC.map(n=>`<div class="pill ${n==TZ_EXEC?'active':''}" data-exec="${n}">${n}</div>`).join('');
  const projPills=`<div class="pill ${TZ_PROJ===''?'active':''}" data-tzp="">Общее</div>`+DATA.projects.map(p=>`<div class="pill ${TZ_PROJ==p.id?'active':''}" data-tzp="${p.id}">${esc(p.name)}</div>`).join('');
  const fields=(TZ_TEMPLATES[TZ_SEC]||[]).map(([id,label,big])=>{
    const v=esc(TZ_FIELDS[id]||'');
    return big
      ? `<div class="muted">${label}:</div><textarea id="tz_${id}" style="min-height:60px">${v}</textarea>`
      : `<div class="muted">${label}:</div><input id="tz_${id}" value="${v}">`;
  }).join('');
  return `<div class="card"><h3>✍️ Дать ТЗ</h3>
    <div class="muted">Раздел:</div><div class="pills">${secPills}</div>
    <div class="muted">Исполнитель:</div><div class="pills">${execPills}</div>
    <div class="muted">Проект:</div><div class="pills">${projPills}</div>
    <div style="border-top:1px solid rgba(127,127,127,.2);margin:8px 0;padding-top:6px">${fields}</div>
    <button class="btn full" data-tz-send>📨 Отправить ТЗ</button>
    <div class="muted" style="margin-top:8px">Заполни нужные поля — ТЗ уйдёт исполнителю в личку и в привязанную группу.</div></div>`;
}

function renderMyWork(){
  const w=DATA.myWork||[];
  if(!w.length) return '<div class="card"><h3>🗂️ Моя работа</h3><div class="muted">Сейчас нет элементов на твоём этапе 🎉</div></div>';
  return w.map(it=>{
    if(it.type==='graphic') return `<div class="card"><div class="row"><b>${esc(it.projectName)}</b><span class="chip">🖼 графика</span></div><div class="muted">Осталось: ${it.left}</div><button class="btn sm full" data-gfx="${it.projectId}">✅ Готова одна</button></div>`;
    const act = it.pending ? '<div class="chip">⏳ на подтверждении</div>' : `<button class="btn sm full" data-adv="${it.id}">✅ Готово, дальше</button>`;
    return `<div class="card"><div class="row"><b>${esc(it.projectName)} — Видео #${it.idx}</b><span class="chip">${DATA.stageLabels[it.stage]}</span></div>${act}</div>`;
  }).join('');
}

function bind(){
  document.querySelectorAll('[data-go-video]').forEach(b=>b.onclick=()=>{PROJ=+b.dataset.goVideo;TAB=DATA.tabs.includes('video')?'video':TAB;buildTabs();render();});
  document.querySelectorAll('[data-proj]').forEach(b=>b.onclick=()=>{PROJ=+b.dataset.proj;render();});
  document.querySelectorAll('[data-adv]').forEach(b=>b.onclick=()=>act({type:'vid_adv',id:+b.dataset.adv}));
  document.querySelectorAll('[data-fmt]').forEach(b=>b.onclick=()=>{const[id,f]=b.dataset.fmt.split(':');act({type:'vid_fmt',id:+id,format:f});});
  document.querySelectorAll('[data-gfx]').forEach(b=>b.onclick=()=>act({type:'gfx_done',projectId:+b.dataset.gfx}));
  document.querySelectorAll('[data-done]').forEach(b=>b.onclick=()=>act({type:'task_done',id:+b.dataset.done}));
  document.querySelectorAll('[data-file]').forEach(b=>b.onclick=async()=>{await act({type:'task_submit_file',id:+b.dataset.file});tg.showAlert&&tg.showAlert('Открой чат с ботом и пришли файл готовой работы 📎');});
  document.querySelectorAll('[data-confirm]').forEach(b=>b.onclick=()=>act({type:'task_confirm',id:+b.dataset.confirm}));
  document.querySelectorAll('[data-approve]').forEach(b=>b.onclick=()=>act({type:'task_approve',id:+b.dataset.approve}));
  document.querySelectorAll('[data-reject]').forEach(b=>b.onclick=()=>act({type:'task_reject',id:+b.dataset.reject}));
  document.querySelectorAll('[data-assignto]').forEach(b=>b.onclick=()=>{ASSIGN_I=+b.dataset.assignto;render();});
  const asend=document.querySelector('[data-assign-send]'); if(asend) asend.onclick=async()=>{const team=DATA.team||[];const m=team[ASSIGN_I];const title=(val('assignTitle')||'').trim();if(!m){tg.showAlert&&tg.showAlert('Выбери исполнителя');return;}if(!title){tg.showAlert&&tg.showAlert('Впиши задачу');return;}await act({type:'task_assign',assignee:m.anchor,title,deadline:val('assignDeadline')});tg.showAlert&&tg.showAlert('Задача назначена ✅');};
  document.querySelectorAll('[data-emp]').forEach(b=>b.onclick=()=>{WORK_EMP=+b.dataset.emp;render();});
  document.querySelectorAll('[data-sec]').forEach(b=>b.onclick=()=>{captureTZ();TZ_SEC=b.dataset.sec;TZ_EXEC=SEC_DEFAULT[TZ_SEC]||TZ_EXEC;render();});
  document.querySelectorAll('[data-exec]').forEach(b=>b.onclick=()=>{captureTZ();TZ_EXEC=b.dataset.exec;render();});
  document.querySelectorAll('[data-tzp]').forEach(b=>b.onclick=()=>{captureTZ();TZ_PROJ=b.dataset.tzp;render();});
  const send=document.querySelector('[data-tz-send]');
  if(send) send.onclick=async()=>{captureTZ();const tpl=TZ_TEMPLATES[TZ_SEC]||[];const lines=[];tpl.forEach(([id,label])=>{const v=(TZ_FIELDS[id]||'').trim();if(v)lines.push(label+': '+v);});const text=lines.join('\n');if(!text){tg.showAlert&&tg.showAlert('Заполни хотя бы одно поле');return;}await act({type:'tz',section:TZ_SEC,assignee:TZ_EXEC,projectId:TZ_PROJ||null,text});TZ_FIELDS={};render();tg.showAlert&&tg.showAlert('ТЗ отправлено ✅');};

  // ---- таблица ----
  document.querySelectorAll('[data-tproj]').forEach(b=>b.onclick=()=>{TBL_PROJ=+b.dataset.tproj;TBL_PLAN=null;TBL_OPEN=null;TBL_NEWPERIOD=false;render();});
  document.querySelectorAll('[data-tplan]').forEach(b=>b.onclick=()=>{TBL_PLAN=+b.dataset.tplan;TBL_OPEN=null;TBL_NEWPERIOD=false;render();});
  const pnew=document.querySelector('[data-tplan-new]'); if(pnew) pnew.onclick=()=>{TBL_NEWPERIOD=!TBL_NEWPERIOD;render();};
  const npc=document.querySelector('[data-np-create]'); if(npc) npc.onclick=async()=>{const period=(val('np_name')||'').trim(); if(!period){tg.showAlert&&tg.showAlert('Введите название периода');return;} const videos=parseInt(val('np_videos'))||0, graphics=parseInt(val('np_graphics'))||0; const res=await api('POST',{type:'plan_create',projectId:TBL_PROJ,period,videos,graphics}); if(res&&res.projects){DATA=res;} TBL_NEWPERIOD=false;TBL_PLAN=null;TBL_LOADED=null; render(); tg.showAlert&&tg.showAlert('Период создан ✅');};
  document.querySelectorAll('[data-topen]').forEach(b=>b.onclick=()=>{TBL_OPEN=+b.dataset.topen;render();});
  const tclose=document.querySelector('[data-tclose]'); if(tclose) tclose.onclick=()=>{TBL_OPEN=null;render();};
  document.querySelectorAll('[data-titype]').forEach(b=>b.onclick=()=>{const it=TBL_ITEMS.find(x=>x.id==TBL_OPEN); if(it){captureFields(it); it.type=b.dataset.titype; if(!STATUS_OPTS(it.type).some(s=>s[0]==it.stage)) it.stage=STATUS_OPTS(it.type)[0][0];} render();});
  document.querySelectorAll('[data-tstatus]').forEach(b=>b.onclick=()=>{const it=TBL_ITEMS.find(x=>x.id==TBL_OPEN); if(it){captureFields(it); it.stage=b.dataset.tstatus;} render();});
  document.querySelectorAll('[data-tlang]').forEach(b=>b.onclick=()=>{const it=TBL_ITEMS.find(x=>x.id==TBL_OPEN); if(it){captureFields(it); it.lang=(it.lang===b.dataset.tlang?'':b.dataset.tlang);} render();});
  document.querySelectorAll('[data-tadd]').forEach(b=>b.onclick=()=>act({type:'item_add',planId:TBL_PLAN,projectId:TBL_PROJ,itemType:b.dataset.tadd}));
  const tsave=document.querySelector('[data-tsave]'); if(tsave) tsave.onclick=async()=>{const it=TBL_ITEMS.find(x=>x.id==TBL_OPEN); const newPos=parseInt(val('f_pos'))||it.idx; const fields={type:it.type,status:it.stage,lang:it.lang||'',theme:val('f_theme'),script:val('f_script'),reference:val('f_reference'),props:val('f_props'),shoot_date:val('f_shoot'),deadline:val('f_deadline')}; let res=await api('POST',{type:'item_update',id:it.id,planId:TBL_PLAN,fields}); if(newPos!==it.idx){ res=await api('POST',{type:'item_move',id:it.id,planId:TBL_PLAN,toPos:newPos}); } if(res&&res.items)TBL_ITEMS=res.items; TBL_OPEN=null; render();};
  document.querySelectorAll('[data-mv]').forEach(b=>b.onclick=(e)=>{e.stopPropagation();const[id,toPos]=b.dataset.mv.split(':');act({type:'item_move',id:+id,planId:TBL_PLAN,toPos:+toPos});});
  // пробел и прочие клавиши не должны перехватываться контейнером Telegram
  document.querySelectorAll('input,textarea').forEach(el=>{el.addEventListener('keydown',e=>e.stopPropagation());el.addEventListener('keypress',e=>e.stopPropagation());});
  document.querySelectorAll('[data-dl]').forEach(inp=>inp.onchange=async()=>{const res=await api('POST',{type:'item_patch',id:+inp.dataset.dl,planId:TBL_PLAN,patch:{deadline:inp.value}}); if(res&&res.items)TBL_ITEMS=res.items;});
  const tdel=document.querySelector('[data-tdel]'); if(tdel) tdel.onclick=()=>{const del=async()=>{const res=await api('POST',{type:'item_delete',id:TBL_OPEN,planId:TBL_PLAN}); if(res&&res.items)TBL_ITEMS=res.items; TBL_OPEN=null; render();}; if(tg.showConfirm){tg.showConfirm('Удалить пункт?',(ok)=>{if(ok)del();});}else del();};
}

load();
</script>
</body>
</html>
